services:
  web:
    build: .
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    restart: unless-stopped

  worker:
    build: .
    command: python worker.py
    env_file:
      - .env
    restart: unless-stopped
