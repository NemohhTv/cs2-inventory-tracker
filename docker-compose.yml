services:
  web:
    build: .
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - watchlist_data:/app/data
    environment:
      - STEAM_ID=${STEAM_ID:-}
      - CSFLOAT_API_KEY=${CSFLOAT_API_KEY:-}
      - WATCHLIST=${WATCHLIST:-}
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - ALERT_THRESHOLD=${ALERT_THRESHOLD:-0.05}
      - PRICE_DELAY_SEC=${PRICE_DELAY_SEC:-3.0}
      - CSFLOAT_CACHE_TTL_SEC=${CSFLOAT_CACHE_TTL_SEC:-1200}
      - CSFLOAT_MAX_ITEMS=${CSFLOAT_MAX_ITEMS:-40}
    restart: unless-stopped

  worker:
    build: .
    command: python worker.py
    volumes:
      - watchlist_data:/app/data
    environment:
      - STEAM_ID=${STEAM_ID:-}
      - CSFLOAT_API_KEY=${CSFLOAT_API_KEY:-}
      - WATCHLIST=${WATCHLIST:-}
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - ALERT_THRESHOLD=${ALERT_THRESHOLD:-0.05}
      - PRICE_DELAY_SEC=${PRICE_DELAY_SEC:-3.0}
      - CSFLOAT_MAX_ITEMS=${CSFLOAT_MAX_ITEMS:-40}
      - WORKER_POLL_INTERVAL_SEC=${WORKER_POLL_INTERVAL_SEC:-3600}
      - CSFLOAT_RATE_LIMIT_BACKOFF_SEC=${CSFLOAT_RATE_LIMIT_BACKOFF_SEC:-600}
    restart: unless-stopped

volumes:
  watchlist_data:
